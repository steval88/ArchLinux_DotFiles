# ~/.config/hypr/hypridle.conf
# ============================================================================
#  Idle management (hypridle). Classic hyprlang syntax — NOT Lua.
#  Started from autostart.lua. Drives the lock screen defined in hyprlock.conf.
#  https://wiki.hypr.land/Hypr-Ecosystem/hypridle/
# ============================================================================

general {
    lock_cmd        = pidof hyprlock || hyprlock   # don't stack hyprlock instances
    before_sleep_cmd = loginctl lock-session       # lock before the system suspends
    after_sleep_cmd  = hyprctl dispatch dpms on     # wake the display on resume
    ignore_dbus_inhibit = false                     # respect "inhibit idle" (e.g. video players)
}

# Lock the session after 5 minutes idle.
# (Goes through loginctl -> the dbus lock event -> lock_cmd above, so it never
#  launches a second hyprlock.)
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# Turn the screen off shortly after locking; back on when you move/type.
listener {
    timeout    = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# Suspend the laptop after 30 minutes idle (comment out if you don't want this).
listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
