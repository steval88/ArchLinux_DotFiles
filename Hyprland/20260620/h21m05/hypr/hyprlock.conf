# ~/.config/hypr/hyprlock.conf
# ============================================================================
#  Lock screen (hyprlock). Classic hyprlang syntax — NOT Lua.
#  Triggered by hypridle (and by SUPER+L). https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
#
#  NOTE: hyprlock can't read theme.lua, so the Catppuccin Mocha colors are
#  written out here directly. This is the one place colors aren't centralized —
#  if you re-skin theme.lua, mirror the accents below.
# ============================================================================

$font = sans-serif        # swap for a Nerd Font (e.g. "JetBrainsMono Nerd Font") if installed

general {
    hide_cursor      = false   # show the mouse cursor on the lock screen
    immediate_render = true    # draw the lock right away instead of waiting a frame
    fractional_scaling = 1
}

# Make typing feel instant: keep a quick fade when the lock appears, but render
# the password dots and focus color with no animation (that fade was the "lag").
animations {
    enabled = true
    animation = fadeIn,           1, 4, linear
    animation = inputFieldDots,   0
    animation = inputFieldColors, 0
}

# --- background -------------------------------------------------------------
# Solid Catppuccin base — no image dependency, and doesn't expose your desktop.
# Prefer a blurred snapshot instead? comment `color` and use:  path = screenshot
background {
    monitor =
    color   = rgb(1e1e2e)      # base
    # path        = screenshot
    # blur_passes = 3
}

# --- clock ------------------------------------------------------------------
label {
    monitor   =
    text      = $TIME
    color     = rgb(cdd6f4)    # text
    font_size = 110
    font_family = $font
    position  = 0, 160
    halign    = center
    valign    = center
}

# --- date -------------------------------------------------------------------
label {
    monitor   =
    text      = cmd[update:60000] date +"%A, %d %B %Y"
    color     = rgb(a6adc8)    # subtext
    font_size = 22
    font_family = $font
    position  = 0, 70
    halign    = center
    valign    = center
}

# --- greeting ---------------------------------------------------------------
label {
    monitor   =
    text      = Hi, $USER
    color     = rgb(b4befe)    # lavender
    font_size = 16
    font_family = $font
    position  = 0, -120
    halign    = center
    valign    = center
}

# --- password input ---------------------------------------------------------
input-field {
    monitor =
    size    = 250, 50
    outline_thickness = 2
    rounding = 10

    inner_color = rgba(313244cc)                       # surface0, translucent
    outer_color = rgba(89b4faee) rgba(b4befeee) 45deg  # blue -> lavender (matches borders)
    check_color = rgba(a6e3a1ee) rgba(94e2d5ee) 120deg # green/teal while authenticating
    fail_color  = rgba(f38ba8ee) rgba(eba0acee) 40deg  # red/maroon on wrong password
    font_color  = rgb(cdd6f4)                          # text

    placeholder_text = <i>Password…</i>
    fail_text        = <i>$FAIL ($ATTEMPTS)</i>
    fade_on_empty    = false
    dots_spacing     = 0.3

    position = 0, -30
    halign   = center
    valign   = center
}

# Fingerprint reader? uncomment and adjust:
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#     }
# }
